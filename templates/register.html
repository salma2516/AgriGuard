<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
      content="width=device-width, initial-scale=1.0">

<title>AgriGuard Registration</title>

<link rel="stylesheet"
      href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="auth-container">

    <div class="auth-card">

        <h2>🌱 AgriGuard Registration</h2>

        <form method="POST">

            <input type="text"
                   name="farmer_name"
                   placeholder="Farmer Name"
                   required>

            <input type="text"
                   name="phone_number"
                   placeholder="Phone Number"
                   required>

            <input type="password"
                   name="password"
                   placeholder="Password"
                   required>

            <input type="text"
                   name="country"
                   placeholder="Country"
                   required>

            <select name="language">

                <option value="en">
                    English
                </option>

                <option value="ta">
                    Tamil
                </option>

                <option value="hi">
                    Hindi
                </option>

                <option value="te">
                    Telugu
                </option>

                <option value="kn">
                    Kannada
                </option>

            </select>

            <button type="submit">

                Register

            </button>

        </form>

        <br>

        <p style="text-align:center;">

            Already Registered?

            <a href="/login">

                Login Here

            </a>

        </p>

    </div>

</div>

</body>

</html>
