<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
      content="width=device-width, initial-scale=1.0">

<title>AgriGuard Login</title>

<link rel="stylesheet"
      href="{{ url_for('static', filename='style.css') }}">


</head>

<body>

<div class="auth-container">

    <div class="auth-card">

        <h2>🌱 AgriGuard Login</h2>

        <form method="POST">

            <input type="text"
                   name="phone_number"
                   placeholder="Phone Number"
                   required>

            <input type="password"
                   name="password"
                   placeholder="Password"
                   required>

            <button type="submit">

                Login

            </button>

        </form>

        {% if error %}

        <p class="danger"
           style="margin-top:15px;text-align:center;">

            {{ error }}

        </p>

        {% endif %}

        <br>

        <p style="text-align:center;">

            New Farmer?

            <a href="/register">

                Register Here

            </a>

        </p>

    </div>

</div>

</body>

</html>
